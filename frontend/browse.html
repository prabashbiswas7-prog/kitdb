<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Browse Kits — KitDB</title>
<link rel="stylesheet" href="/assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.browse-layout { display:grid; grid-template-columns:220px 1fr; gap:2rem; align-items:start; }
.filters-panel { position:sticky; top:calc(var(--nav-h) + 1rem); max-height:calc(100vh - var(--nav-h) - 2rem); overflow-y:auto; overscroll-behavior:contain; }
.mobile-filter-btn { display:none; background:var(--s2); border:1px solid var(--bd); border-radius:9px; padding:0 1rem; color:var(--w); cursor:pointer; align-items:center; justify-content:center; }
.mobile-filter-btn:hover { border-color:var(--bdg); color:var(--g); }
@media(max-width:800px){
  .browse-layout{grid-template-columns:1fr;}
  .mobile-filter-btn { display:flex; }
  .filters-panel {
    display:none; position:fixed; inset:0; background:var(--bk); z-index:900;
    max-height:100vh; top:0; padding:1.5rem; border-radius:0; border:none;
  }
  .filters-panel.open { display:block; }
  .filters-panel.open .fp-mobile-header { display:flex !important; }
}
.fp-section { margin-bottom:1.5rem; }
.fp-label { font-size:.62rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--w4); margin-bottom:.6rem; display:block; }
.fp-group { display:flex; flex-direction:column; gap:.25rem; }
.fp-opt { display:flex; align-items:center; gap:.5rem; padding:.38rem .6rem; border-radius:6px; cursor:pointer; font-size:.82rem; color:var(--w3); transition:all .15s; }
.fp-opt:hover { background:var(--s3); color:var(--w); }
.fp-opt.active { background:var(--gf); color:var(--g); }
.fp-opt input { display:none; }
.results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:.5rem; }
.result-count { font-family:var(--fm); font-size:.75rem; color:var(--w4); }
.sort-select { background:var(--s2); border:1px solid var(--bd); border-radius:6px; padding:.35rem .8rem; font-size:.75rem; color:var(--w3); outline:none; font-family:var(--fb); }
.sort-select:focus { border-color:var(--bdg); }
/* ad every 6 cards */
.grid-ad { grid-column:1/-1; }
.view-toggle { display:flex; gap:.2rem; background:var(--s2); border:1px solid var(--bd); border-radius:7px; padding:.18rem; }
.vb { background:none; border:none; color:var(--w4); padding:.22rem .48rem; border-radius:5px; font-size:.8rem; transition:all .15s; }
.vb.active { background:var(--s4); color:var(--w); }
.kit-grid.list-view { grid-template-columns:1fr; }
.kit-grid.list-view .kit-card { display:flex; align-items:center; gap:.9rem; border-radius:9px; }
.kit-grid.list-view .kit-card-img { height:70px; width:70px; flex-shrink:0; border-radius:8px 0 0 8px; }
.kit-grid.list-view .kit-card-img img { height:54px; }
.kit-grid.list-view .kit-card-body { flex:1; display:flex; align-items:center; gap:1.5rem; padding:.7rem .9rem .7rem 0; }
.kit-grid.list-view .kit-card-team { min-width:140px; margin-bottom:0; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">Kit<span>DB</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/browse.html" class="nav-link">Browse</a>
    <a href="/search.html" class="nav-link">Search</a>
    <a href="/about.html" class="nav-link">About</a>
    <a href="/contact.html" class="nav-link">Contact</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<div class="container" style="padding-top:1.5rem">
  <!-- TOP BANNER AD -->
  <div id="ad-top-banner" class="ad-slot ad-banner"></div>

  <!-- Mobile search -->
  <div class="search-wrap" style="margin-bottom:1rem">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search-q" type="text" placeholder="Search kits…" oninput="render()"/>
  </div>

  <div class="browse-layout">
    <!-- FILTERS SIDEBAR -->
    <div class="filters-panel panel" id="filters-panel">
      <div class="fp-mobile-header" style="display:none; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h3 style="margin:0; font-size:1.2rem; color:var(--w);">Filters</h3>
        <button onclick="toggleMobileFilters()" style="background:none; border:none; color:var(--w); font-size:1.5rem; cursor:pointer;">✕</button>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
        <h3 style="margin:0; font-size:1rem; color:var(--w);">Filters</h3>
        <button onclick="clearFilters()" style="background:none; border:none; color:var(--w4); font-size:0.75rem; cursor:pointer; text-decoration:underline;">Clear All</button>
      </div>
      <div class="fp-section">
        <span class="fp-label">Kit Type</span>
        <div class="fp-group" id="type-filters">
          <label class="fp-opt active" onclick="toggleFilter('type','All',this)"><input type="radio" name="type"/>All Types</label>
          <label class="fp-opt" onclick="toggleFilter('type','Home',this)"><input type="radio" name="type"/>🟢 Home</label>
          <label class="fp-opt" onclick="toggleFilter('type','Away',this)"><input type="radio" name="type"/>⚫ Away</label>
          <label class="fp-opt" onclick="toggleFilter('type','Third',this)"><input type="radio" name="type"/>🔵 Third</label>
          <label class="fp-opt" onclick="toggleFilter('type','Special Edition',this)"><input type="radio" name="type"/>⭐ Special</label>
          <label class="fp-opt" onclick="toggleFilter('type','GK',this)"><input type="radio" name="type"/>🧤 GK</label>
        </div>
      </div>
      <div class="fp-section">
        <span class="fp-label">League</span>
        <div class="fp-group" id="league-filters"></div>
      </div>
      <div class="fp-section">
        <span class="fp-label">Season</span>
        <div class="fp-group" id="season-filters"></div>
      </div>
      <div class="fp-section">
        <span class="fp-label">Manufacturer</span>
        <div class="fp-group" id="maker-filters"></div>
      </div>
      <!-- SIDEBAR AD -->
      <div id="ad-sidebar" class="ad-slot ad-sidebar" style="margin-top:1rem"></div>
    </div>

    <!-- GRID -->
    <div>
      <div class="results-bar">
        <span class="result-count" id="result-count">Loading…</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          <button class="mobile-filter-btn" onclick="toggleMobileFilters()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg> Filters
          </button>
          <select class="sort-select" id="sort-sel" onchange="render()">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="rating">Top Rated</option>
            <option value="az">A → Z</option>
          </select>
          <div class="view-toggle">
            <button class="vb active" id="vg" onclick="setView('grid')">⊞</button>
            <button class="vb" id="vl" onclick="setView('list')">≡</button>
          </div>
        </div>
      </div>
      <div class="kit-grid" id="browse-grid"></div>
    </div>
  </div>
</div>

<div style="height:3rem"></div>
<footer><strong>KitDB</strong> &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/browse.html">Browse</a></footer>

<script src="/assets/js/config.js"></script>
<script>
let allKits = [], filters = { type: 'All', league: '', season: '', maker: '' }, viewMode = 'grid';

(async () => {
  await initNav();
  const { data } = await sb.from('kits_with_stats').select('*').eq('is_published', true);
  allKits = data || [];
  buildFilterOptions();
  render();
  injectAd('top_banner','ad-top-banner');
  injectAd('sidebar','ad-sidebar');
  // check for ?q= param
  const q = new URLSearchParams(location.search).get('q');
  if (q) { document.getElementById('search-q').value = q; render(); }
})();

function buildFilterOptions() {
  const leagues = [...new Set(allKits.map(k=>k.league).filter(Boolean))].sort();
  const seasons = [...new Set(allKits.map(k=>k.season).filter(Boolean))].sort().reverse();
  const makers  = [...new Set(allKits.map(k=>k.maker).filter(Boolean))].sort();
  fillFilter('league-filters', leagues, 'league');
  fillFilter('season-filters', seasons, 'season');
  fillFilter('maker-filters',  makers,  'maker');
}
function fillFilter(id, vals, key) {
  document.getElementById(id).innerHTML = vals.map(v =>
    `<label class="fp-opt" onclick="toggleFilter('${key}','${v}',this)"><input type="radio" name="${key}"/>${v}</label>`
  ).join('');
}
function toggleFilter(key, val, el) {
  filters[key] = val;
  const group = el.closest('.fp-group') || el.closest('#type-filters');
  group?.querySelectorAll('.fp-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  render();
}
function clearFilters() {
  filters = { type: 'All', league: '', season: '', maker: '' };
  document.querySelectorAll('.fp-opt').forEach(el => el.classList.remove('active'));
  const allTypesLabel = document.querySelector('#type-filters .fp-opt:first-child');
  if (allTypesLabel) allTypesLabel.classList.add('active');

  // Also clear the search query if desired, but user asked for "clear filter option"
  // Let's also clear search to fully reset the browse page
  document.getElementById('search-q').value = '';

  render();
}
function setView(v) {
  viewMode = v;
  document.getElementById('vg').classList.toggle('active', v==='grid');
  document.getElementById('vl').classList.toggle('active', v==='list');
  const g = document.getElementById('browse-grid');
  g.classList.toggle('list-view', v==='list');
  render();
}

function toggleMobileFilters() {
  const panel = document.getElementById('filters-panel');
  if (panel) {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
  }
}

async function render() {
  const q = document.getElementById('search-q').value.toLowerCase().trim();
  const sort = document.getElementById('sort-sel').value;
  let kits = allKits.filter(k => {
    if (filters.type !== 'All' && k.type !== filters.type) return false;
    if (filters.league && k.league !== filters.league) return false;
    if (filters.season && k.season !== filters.season) return false;
    if (filters.maker  && k.maker  !== filters.maker)  return false;
    if (q) { const h = [k.team,k.league,k.season,k.maker,k.type,k.color,k.description].join(' ').toLowerCase(); if (!h.includes(q)) return false; }
    return true;
  });
  if (sort === 'rating')  kits.sort((a,b) => b.avg_rating - a.avg_rating);
  else if (sort === 'az') kits.sort((a,b) => a.team.localeCompare(b.team));
  else if (sort === 'oldest') kits.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  else kits.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  document.getElementById('result-count').textContent = `${kits.length} kit${kits.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('browse-grid');
  grid.className = 'kit-grid' + (viewMode === 'list' ? ' list-view' : '');
  if (!kits.length) { grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>NO KITS FOUND</h3><p>Try different filters.</p></div>`; return; }

  // insert ad slot every 8 cards
  let html = '';
  const adSlot = await getAdSlot('browse_grid');
  kits.forEach((k, i) => {
    if (i > 0 && i % 8 === 0 && adSlot?.is_active && adSlot?.ad_code) {
      html += `<div class="grid-ad"><div class="ad-slot ad-inline" style="display:block"><div class="ad-label">Advertisement</div>${adSlot.ad_code}</div></div>`;
    }
    html += kitCardHTML(k);
  });
  grid.innerHTML = html;
}

function kitCardHTML(k) {
  const bc = k.type==='Home'?'b-home':k.type==='Away'?'b-away':k.type==='Special Edition'?'b-special':k.type==='GK'?'b-gk':'b-third';
  const idx = k.id.charCodeAt(0) % 6;
  return `<a href="/kit.html?slug=${k.slug}" class="kit-card" onclick="trackClick()">
    <div class="kit-card-img grad-${idx}">
      ${k.image_url ? `<img src="${k.image_url}" alt="${k.team}" loading="lazy"/>` : `<span class="kit-card-ph">⚽</span>`}
      <span class="badge ${bc}" style="position:absolute;top:.55rem;right:.55rem">${k.type}</span>
    </div>
    <div class="kit-card-body">
      <div class="kit-card-team">${k.team}</div>
      <div class="kit-card-season">${k.season}</div>
      <div class="kit-card-league">${k.league||''}</div>
      <div class="kit-card-rating">${renderStars(parseFloat(k.avg_rating), k.rating_count)}</div>
      ${k.price_label ? `<div style="font-size:.72rem;color:var(--g);font-weight:600;margin-top:.25rem">${k.price_label}</div>` : ''}
    </div>
  </a>`;
}
</script>
</body>
</html>
