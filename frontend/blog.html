<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Blog — KitDB</title>
<meta name="description" id="page-desc" content="Latest football kit news, reviews and updates from KitDB."/>
<meta property="og:title" id="og-title" content="Blog — KitDB"/>
<meta property="og:description" id="og-desc" content="Latest football kit news from KitDB."/>
<meta property="og:image" id="og-img" content=""/>
<meta property="og:type" content="website"/>
<link rel="stylesheet" href="/assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.blog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.5rem; }
.blog-card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s; display:block; }
.blog-card:hover { border-color:var(--bdg); transform:translateY(-3px); box-shadow:0 12px 35px rgba(0,200,83,.07); }
.blog-cover { height:200px; background:var(--s2); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:3rem; opacity:.2; }
.blog-cover img { width:100%; height:100%; object-fit:cover; opacity:1; }
.blog-body { padding:1.25rem; }
.blog-tags { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.75rem; }
.blog-tag { font-size:.62rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:var(--gf); color:var(--g); border:1px solid var(--bdg); padding:.18rem .5rem; border-radius:4px; }
.blog-title { font-family:var(--fd); font-size:1.3rem; letter-spacing:1px; margin-bottom:.5rem; line-height:1.2; }
.blog-excerpt { font-size:.83rem; color:var(--w3); line-height:1.6; margin-bottom:.875rem; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.blog-meta { display:flex; align-items:center; justify-content:space-between; font-size:.72rem; color:var(--w4); }
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">Kit<span>DB</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/browse.html" class="nav-link">Browse</a>
    <a href="/blog.html" class="nav-link active">Blog</a>
    <a href="/search.html" class="nav-link">Search</a>
    <a href="/about.html" class="nav-link">About</a>
    <a href="/contact.html" class="nav-link">Contact</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<div class="container" style="padding-top:2rem">
  <div id="ad-top-banner" class="ad-slot ad-banner"></div>
  <div id="blog-builder-root">
    <div class="section-head">
      <span class="section-title">LATEST <span>NEWS</span></span>
    </div>
    <div class="blog-grid" id="blog-grid"><div class="spinner" style="grid-column:1/-1"></div></div>
  </div>
</div>

<div style="height:3rem"></div>
<footer>
  <strong>KitDB</strong> &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/browse.html">Browse</a> &nbsp;·&nbsp; <a href="/blog.html">Blog</a>
  <div style="margin-top:.75rem;color:var(--w4)" id="footer-text"></div>
</footer>

<script src="/assets/js/config.js"></script>
<script>
(async () => {
  await initNav();
  await loadSEO();
  const renderedByBuilder = await loadBlogSections();
  if (!renderedByBuilder) await loadPosts();
  injectAd('top_banner','ad-top-banner');
})();

async function loadSEO() {
  const { data } = await sb.from('site_settings').select('*');
  if (!data) return;
  const s = Object.fromEntries(data.map(r => [r.key, r.value]));
  if (s.footer_text) document.getElementById('footer-text').textContent = s.footer_text;
  if (s.google_analytics_id) loadGA(s.google_analytics_id);
}

async function loadPosts() {
  const { data } = await sb.from('blog_posts').select('*').eq('is_published', true).order('published_at', { ascending: false });
  const grid = document.getElementById('blog-grid');
  if (!data?.length) { grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon"><i class="fa-solid fa-file-lines"></i></div><h3>NO POSTS YET</h3><p>Check back soon.</p></div>`; return; }
  grid.innerHTML = data.map(p => `
    <a href="/blog-post.html?slug=${p.slug}" class="blog-card" onclick="trackClick()">
      <div class="blog-cover">${p.cover_image ? `<img src="${p.cover_image}" alt="${p.title}"/>` : '<i class="fa-solid fa-file-lines" style="font-size:3rem;color:var(--w3)"></i>'}</div>
      <div class="blog-body">
        ${p.tags?.length ? `<div class="blog-tags">${p.tags.map(t=>`<span class="blog-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="blog-title">${p.title}</div>
        ${p.excerpt ? `<div class="blog-excerpt">${p.excerpt}</div>` : ''}
        <div class="blog-meta">
          <span>${p.published_at ? new Date(p.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : ''}</span>
          <span style="color:var(--g)">Read more →</span>
        </div>
      </div>
    </a>`).join('');
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

async function loadBlogSections() {
  const { data: sections, error } = await sb.from('blog_page_sections')
    .select('*')
    .eq('is_active', true)
    .order('sort_order')
    .order('id');
  if (error || !sections?.length) return false;
  const uniqueSections = dedupeSectionsByType(sections);

  const root = document.getElementById('blog-builder-root');
  const blocks = [];
  for (const s of uniqueSections) {
    const c = s.settings || {};

    if (s.type === 'featured_story') {
      const { data: post } = await sb.from('blog_posts')
        .select('*')
        .eq('is_published', true)
        .order('published_at', { ascending: false })
        .limit(1)
        .maybeSingle();
      blocks.push(`
        <div class="section-head"><span class="section-title">${esc(c.title || 'FEATURED')} <span>STORY</span></span></div>
        ${post ? `
          <a href="/blog-post.html?slug=${encodeURIComponent(post.slug)}" class="blog-card" onclick="trackClick()" style="margin-bottom:1.5rem;display:block">
            <div class="blog-cover" style="height:320px">${post.cover_image ? `<img src="${post.cover_image}" alt="${esc(post.title)}"/>` : '<i class="fa-solid fa-file-lines" style="font-size:3rem;color:var(--w3)"></i>'}</div>
            <div class="blog-body">
              ${post.tags?.length ? `<div class="blog-tags">${post.tags.map(t=>`<span class="blog-tag">${esc(t)}</span>`).join('')}</div>` : ''}
              <div class="blog-title">${esc(post.title)}</div>
              ${post.excerpt ? `<div class="blog-excerpt">${esc(post.excerpt)}</div>` : ''}
              <div class="blog-meta"><span>${post.published_at ? new Date(post.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : ''}</span><span style="color:var(--g)">Read more →</span></div>
            </div>
          </a>` : `<div class="empty"><p>No featured story yet.</p></div>`}
      `);
    }

    if (s.type === 'latest_grid') {
      const limit = Math.max(parseInt(c.limit || 9, 10), 1);
      const { data: posts } = await sb.from('blog_posts')
        .select('*')
        .eq('is_published', true)
        .order('published_at', { ascending: false })
        .limit(limit);
      blocks.push(`
        <div class="section-head"><span class="section-title">${esc(c.title || 'LATEST')} <span>NEWS</span></span></div>
        <div class="blog-grid">
          ${(posts || []).map(p => `
            <a href="/blog-post.html?slug=${encodeURIComponent(p.slug)}" class="blog-card" onclick="trackClick()">
              <div class="blog-cover">${p.cover_image ? `<img src="${p.cover_image}" alt="${esc(p.title)}"/>` : '<i class="fa-solid fa-file-lines" style="font-size:3rem;color:var(--w3)"></i>'}</div>
              <div class="blog-body">
                ${p.tags?.length ? `<div class="blog-tags">${p.tags.map(t=>`<span class="blog-tag">${esc(t)}</span>`).join('')}</div>` : ''}
                <div class="blog-title">${esc(p.title)}</div>
                ${p.excerpt ? `<div class="blog-excerpt">${esc(p.excerpt)}</div>` : ''}
                <div class="blog-meta"><span>${p.published_at ? new Date(p.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : ''}</span><span style="color:var(--g)">Read more →</span></div>
              </div>
            </a>
          `).join('') || `<div class="empty" style="grid-column:1/-1"><p>No posts yet.</p></div>`}
        </div>
      `);
    }

    if (s.type === 'trending_list') {
      const limit = Math.max(parseInt(c.limit || 5, 10), 1);
      const { data: posts } = await sb.from('blog_posts')
        .select('title,slug,published_at')
        .eq('is_published', true)
        .order('published_at', { ascending: false })
        .limit(limit);
      blocks.push(`
        <div class="panel" style="margin-top:1.5rem">
          <div class="panel-title">${esc(c.title || 'Trending Posts')}</div>
          ${(posts || []).map(p => `<a href="/blog-post.html?slug=${encodeURIComponent(p.slug)}" style="display:block;padding:.6rem 0;border-bottom:1px solid var(--bd);font-size:.84rem">${esc(p.title)}</a>`).join('') || '<div style="color:var(--w4)">No trending posts yet.</div>'}
        </div>
      `);
    }

    if (s.type === 'newsletter_cta') {
      blocks.push(`
        <div class="panel" style="margin-top:1.5rem">
          <div class="panel-title">${esc(c.title || 'Subscribe to Blog Updates')}</div>
          <p style="color:var(--w3);margin:.5rem 0 1rem">${esc(c.subtitle || 'Get the latest kit stories and updates in your inbox.')}</p>
          <a href="/login.html#signup" class="btn btn-p btn-sm">${esc(c.button_text || 'Subscribe')}</a>
        </div>
      `);
    }
  }

  root.innerHTML = blocks.join('') || root.innerHTML;
  return true;
}

function dedupeSectionsByType(sections) {
  const seen = new Set();
  const result = [];
  for (const section of sections) {
    if (seen.has(section.type)) continue;
    seen.add(section.type);
    result.push(section);
  }
  return result;
}
function loadGA(id) {
  const s = document.createElement('script');
  s.src = `https://www.googletagmanager.com/gtag/js?id=${id}`;
  s.async = true; document.head.appendChild(s);
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);} gtag('js',new Date()); gtag('config',id);
}
</script>
</body>
</html>
