<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Blog — KitDB</title>
<meta name="description" id="page-desc" content=""/>
<meta property="og:title" id="og-title" content=""/>
<meta property="og:description" id="og-desc" content=""/>
<meta property="og:image" id="og-img" content=""/>
<meta property="og:type" content="article"/>
<link rel="stylesheet" href="/assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.post-layout { display:grid; grid-template-columns:1fr 300px; gap:2rem; }
@media(max-width:900px){ .post-layout{grid-template-columns:1fr;} }
.post-cover { width:100%; max-height:420px; object-fit:cover; border-radius:14px; margin-bottom:2rem; }
.post-title { font-family:var(--fd); font-size:clamp(2rem,5vw,3.5rem); letter-spacing:3px; line-height:1; margin-bottom:1rem; }
.post-meta { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--bd); }
.post-date { font-size:.78rem; color:var(--w4); }
.post-tags { display:flex; gap:.4rem; flex-wrap:wrap; }
.post-tag { font-size:.62rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:var(--gf); color:var(--g); border:1px solid var(--bdg); padding:.18rem .5rem; border-radius:4px; }
/* Rich text content styles */
.post-content { font-size:.95rem; line-height:1.8; color:var(--w2); }
.post-content h1,.post-content h2,.post-content h3 { font-family:var(--fd); letter-spacing:2px; color:var(--w); margin:2rem 0 1rem; }
.post-content h1{font-size:2rem}.post-content h2{font-size:1.5rem}.post-content h3{font-size:1.2rem}
.post-content p { margin-bottom:1.25rem; }
.post-content a { color:var(--g); text-decoration:underline; }
.post-content img { max-width:100%; border-radius:10px; margin:1rem 0; }
.post-content blockquote { border-left:3px solid var(--g); padding-left:1.25rem; color:var(--w3); font-style:italic; margin:1.5rem 0; }
.post-content ul,.post-content ol { padding-left:1.5rem; margin-bottom:1.25rem; }
.post-content li { margin-bottom:.4rem; }
.post-content table { width:100%; border-collapse:collapse; margin:1.5rem 0; }
.post-content th,.post-content td { padding:.65rem .9rem; border:1px solid var(--bd); text-align:left; font-size:.85rem; }
.post-content th { background:var(--s2); color:var(--w); }
.post-content iframe { width:100%; border-radius:10px; margin:1rem 0; border:none; }
.post-content pre { background:var(--s2); border-radius:8px; padding:1rem; overflow-x:auto; font-family:var(--fm); font-size:.82rem; margin-bottom:1.25rem; }
.post-content code { background:var(--s3); padding:.15rem .4rem; border-radius:4px; font-family:var(--fm); font-size:.85rem; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">Kit<span>DB</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/browse.html" class="nav-link">Browse</a>
    <a href="/blog.html" class="nav-link active">Blog</a>
    <a href="/search.html" class="nav-link">Search</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<div class="container" style="padding-top:1.5rem">
  <div id="ad-top-banner" class="ad-slot ad-banner"></div>
  <div id="loading" class="spinner"></div>
  <div id="post-content-wrap" style="display:none">
    <div class="post-layout">
      <div>
        <img id="post-cover" class="post-cover" style="display:none"/>
        <div class="post-title" id="post-title"></div>
        <div class="post-meta">
          <span class="post-date" id="post-date"></span>
          <div class="post-tags" id="post-tags"></div>
        </div>
        <div class="post-content" id="post-body"></div>
      </div>
      <div>
        <div id="ad-sidebar" class="ad-slot ad-sidebar" style="margin-bottom:1.5rem"></div>
        <div class="panel">
          <div class="panel-title">Recent Posts</div>
          <div id="recent-posts"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="not-found" style="display:none" class="empty">
    <div class="empty-icon">📝</div>
    <h3>POST NOT FOUND</h3>
    <a href="/blog.html" class="btn btn-p btn-sm" style="margin-top:1rem">← Back to Blog</a>
  </div>
</div>

<div style="height:3rem"></div>
<footer>
  <strong>KitDB</strong> &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/blog.html">Blog</a>
  <div style="margin-top:.75rem;color:var(--w4)" id="footer-text"></div>
</footer>

<script src="/assets/js/config.js"></script>
<script>
const slug = new URLSearchParams(location.search).get('slug');

(async () => {
  if (!slug) { show404(); return; }
  await initNav();
  await loadSettings();
  const { data: post } = await sb.from('blog_posts').select('*').eq('slug', slug).eq('is_published', true).single();
  if (!post) { show404(); return; }

  // SEO
  const title = post.seo_title || post.title + ' — KitDB';
  const desc = post.seo_description || post.excerpt || '';
  const ogImg = post.og_image || post.cover_image || '';
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-desc').content = desc;
  document.getElementById('og-title').content = title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('og-img').content = ogImg;

  // Cover
  if (post.cover_image) {
    const img = document.getElementById('post-cover');
    img.src = post.cover_image; img.alt = post.title; img.style.display = 'block';
  }
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-date').textContent = post.published_at
    ? new Date(post.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '';
  if (post.tags?.length) {
    document.getElementById('post-tags').innerHTML = post.tags.map(t=>`<span class="post-tag">${t}</span>`).join('');
  }
  document.getElementById('post-body').innerHTML = post.content || '';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('post-content-wrap').style.display = 'block';

  // Recent posts
  const { data: recent } = await sb.from('blog_posts').select('title,slug,published_at').eq('is_published',true).neq('slug',slug).order('published_at',{ascending:false}).limit(5);
  document.getElementById('recent-posts').innerHTML = (recent||[]).map(p =>
    `<a href="/blog-post.html?slug=${p.slug}" style="display:block;padding:.55rem 0;border-bottom:1px solid var(--bd);font-size:.83rem;font-weight:500;transition:color .15s" onmouseover="this.style.color='var(--g)'" onmouseout="this.style.color=''">${p.title}</a>`
  ).join('');

  injectAd('top_banner','ad-top-banner');
  injectAd('sidebar','ad-sidebar');
  trackClick();
})();

function show404() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
}
async function loadSettings() {
  const { data } = await sb.from('site_settings').select('*');
  if (!data) return;
  const s = Object.fromEntries(data.map(r=>[r.key,r.value]));
  if (s.footer_text) document.getElementById('footer-text').textContent = s.footer_text;
  if (s.google_analytics_id) {
    const sc = document.createElement('script');
    sc.src = `https://www.googletagmanager.com/gtag/js?id=${s.google_analytics_id}`;
    sc.async = true; document.head.appendChild(sc);
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);} gtag('js',new Date()); gtag('config',s.google_analytics_id);
  }
}
</script>
</body>
</html>
