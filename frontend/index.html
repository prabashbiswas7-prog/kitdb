<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KitDB — Football Kit Encyclopedia</title>
<meta name="description" content="Browse, rate and collect football kits from every club and era. The world's most complete football kit database."/>
<link rel="stylesheet" href="/assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── HERO ── */
.hero { padding: 5rem 0 4rem; position: relative; overflow: hidden; }
.hero::before { content:''; position:absolute; right:-100px; top:-100px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(0,200,83,.1),transparent 65%); pointer-events:none; }
.hero-tag { display:inline-flex; align-items:center; gap:.4rem; background:var(--gf); border:1px solid var(--bdg); color:var(--g); font-size:.68rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:.3rem .9rem; border-radius:100px; margin-bottom:1.25rem; }
.hero h1 { font-family:var(--fd); font-size:clamp(2.8rem,6vw,5rem); letter-spacing:4px; line-height:1; margin-bottom:1rem; }
.hero h1 em { color:var(--g); font-style:normal; }
.hero p { color:var(--w3); font-size:1rem; max-width:480px; line-height:1.7; margin-bottom:2rem; }
.hero-btns { display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:2.5rem; }
.hero-search { max-width:540px; }

/* ── ANNOUNCEMENT ── */
.announcement { background:var(--gf); border:1px solid var(--bdg); border-radius:8px; padding:.7rem 1.25rem; margin-bottom:1.5rem; font-size:.85rem; color:var(--g); display:none; }

/* ── FEATURED ── */
.featured-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:640px){ .featured-grid{grid-template-columns:1fr;} }
.featured-grid { min-height: 640px; align-content:start; }
@media(max-width:640px){ .featured-grid{min-height:780px;} }
.featured-main { grid-row:span 2; }
.featured-card { background:var(--s1); border:1px solid var(--bd); border-radius:14px; overflow:hidden; cursor:pointer; transition:all .2s; display:block; height:100%; }
.featured-card:hover { border-color:var(--bdg); transform:translateY(-3px); box-shadow:0 12px 35px rgba(0,200,83,.08); }
.featured-img { background:var(--s2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.featured-main .featured-img { height:320px; }
.featured-card:not(.featured-main) .featured-img { height:155px; }
.featured-img img { height:80%; object-fit:contain; filter:drop-shadow(0 10px 30px rgba(0,0,0,.6)); transition:transform .3s; }
.featured-card:hover .featured-img img { transform:scale(1.05); }
.featured-img .ph { font-size:4.5rem; opacity:.1; }
.featured-body { padding:1.1rem 1.25rem; }
.featured-team { font-weight:700; font-size:1rem; margin-bottom:.2rem; }
.featured-sub { font-size:.75rem; color:var(--w3); display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
.featured-badge { position:absolute; top:.75rem; left:.75rem; }

/* ── LATEST ── */
.latest-grid { display:grid; grid-template-columns:1fr 300px; gap:2rem; }
@media(max-width:900px){ .latest-grid{grid-template-columns:1fr;} }
#latest-grid { min-height: 460px; }
#top-rated-list { min-height: 280px; }

/* ── HOMEPAGE BLOG PREVIEW ── */
.home-blog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
.home-blog-card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; overflow:hidden; text-decoration:none; display:block; transition:all .2s; }
.home-blog-card:hover { border-color:var(--bdg); transform:translateY(-3px); box-shadow:0 12px 35px rgba(0,200,83,.07); }
.home-blog-cover { height:180px; background:var(--s2); display:flex; align-items:center; justify-content:center; overflow:hidden; font-size:2.2rem; opacity:.2; }
.home-blog-cover img { width:100%; height:100%; object-fit:cover; opacity:1; }
.home-blog-body { padding:1rem 1.1rem; }
.home-blog-tags { display:flex; gap:.35rem; flex-wrap:wrap; margin-bottom:.65rem; }
.home-blog-tag { font-size:.62rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:var(--gf); color:var(--g); border:1px solid var(--bdg); padding:.15rem .45rem; border-radius:4px; }
.home-blog-title { font-family:var(--fd); font-size:1.05rem; margin-bottom:.45rem; line-height:1.2; color:var(--w); }
.home-blog-excerpt { font-size:.82rem; color:var(--w3); line-height:1.55; margin-bottom:.75rem; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.home-blog-meta { display:flex; align-items:center; justify-content:space-between; font-size:.72rem; color:var(--w4); }

/* ── HOMEPAGE GALLERY ── */
.home-gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.9rem; }
.home-gallery-card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; overflow:hidden; text-decoration:none; transition:all .2s; }
.home-gallery-card:hover { border-color:var(--bdg); transform:translateY(-2px); }
.home-gallery-media { height:190px; display:flex; align-items:center; justify-content:center; background:var(--s2); }
.home-gallery-media img { width:100%; height:100%; object-fit:contain; }
.home-gallery-meta { padding:.7rem .8rem; font-size:.74rem; color:var(--w3); }
.home-row-2col,.home-row-3col{display:grid;gap:1rem}
.home-row-2col{grid-template-columns:1fr 1fr}
.home-row-3col{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.home-row-2col,.home-row-3col{grid-template-columns:1fr}}
.home-row-cell{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:1rem}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">Kit<span>DB</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link active">Home</a>
    <a href="/browse.html" class="nav-link">Browse</a>
    <a href="/search.html" class="nav-link">Search</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<!-- TOP BANNER AD -->
<div class="container">
  <div id="ad-top-banner" class="ad-slot ad-banner"></div>
</div>

<!-- HERO -->
<main id="home-sections-root">
  <div class="container" id="hero-wrap">
    <div id="announcement" class="announcement"></div>
    <div class="hero" id="hero-section">
      <div class="hero-tag">⚽ Football Kit Encyclopedia</div>
      <h1 id="hero-title">THE WORLD'S<br/><em>KIT ARCHIVE</em></h1>
      <p id="hero-subtitle">Browse, rate and collect football kits from every club and era.</p>
      <div class="hero-btns">
        <a href="/browse.html" class="btn btn-p btn-lg" id="hero-cta">Browse All Kits</a>
        <a href="/login.html#signup" class="btn btn-g btn-lg">Join Free</a>
      </div>
      <div class="hero-search">
        <div class="search-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" type="text" placeholder="Search team, league, season…" id="hero-search" onkeydown="if(event.key==='Enter')window.location.href='/search.html?q='+encodeURIComponent(this.value)"/>
        </div>
      </div>
    </div>
  </div>

<!-- FEATURED -->
  <div class="container" id="featured-wrap" style="margin-bottom: 3rem;">
    <div class="section-head">
      <span class="section-title" id="featured-title">FEATURED <span>KITS</span></span>
      <a href="/browse.html" class="btn btn-g btn-sm" style="border-radius: 999px; font-size: 0.7rem; padding: 0.2rem 0.6rem;">View All →</a>
    </div>
    <div class="featured-grid" id="featured-grid" style="min-height: auto; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));">
      <div class="spinner" style="grid-column:1/-1"></div>
    </div>
  </div>

<!-- LATEST + SIDEBAR -->
  <div class="container" id="latest-wrap" style="margin-top:3rem">
  <div class="latest-grid">
    <div>
      <div class="section-head">
        <span class="section-title" id="latest-title">LATEST <span>ADDITIONS</span></span>
      </div>
      <div class="kit-grid" id="latest-grid"></div>
    </div>
    <!-- SIDEBAR -->
    <div>
      <div id="ad-sidebar" class="ad-slot ad-sidebar" style="margin-bottom:1.5rem"></div>
      <!-- Top Rated -->
      <div class="panel" style="margin-bottom:1rem; background: var(--bk);">
        <div class="panel-title" style="color: var(--w3); font-size: 0.65rem;">⭐ TOP RATED</div>
        <div id="top-rated-list"></div>
      </div>
    </div>
  </div>
  </div>
</main>

<div style="height:3rem"></div>

<!-- FOOTER -->
<footer>
  <strong>KitDB</strong> &nbsp;·&nbsp;
  <a href="/browse.html">Browse</a> &nbsp;·&nbsp;
  <a href="/search.html">Search</a> &nbsp;·&nbsp;
  <a href="/login.html">Sign In</a>
  <div style="margin-top:.75rem;color:var(--w4)">© 2025 KitDB. All rights reserved.</div>
</footer>

<script src="/assets/js/config.js"></script>
<script>
(async () => {
  await initNav();
  const startupTasks = [
    loadHomepageConfig(),
    loadFeatured(),
    loadLatest(),
    loadTopRated()
  ];
  await Promise.allSettled(startupTasks);

  await Promise.allSettled([
    injectAd('top_banner', 'ad-top-banner'),
    injectAd('sidebar', 'ad-sidebar')
  ]);
})();

async function loadHomepageConfig() {
  const { data } = await sb.from('homepage_config').select('*');
  if (!data) return;
  const cfg = Object.fromEntries(data.map(r => [r.key, r.value]));
  if (cfg.hero_title) document.getElementById('hero-title').innerHTML = cfg.hero_title.replace(/\n/g, '<br/>');
  if (cfg.hero_subtitle) document.getElementById('hero-subtitle').textContent = cfg.hero_subtitle;
  if (cfg.hero_cta_text) document.getElementById('hero-cta').textContent = cfg.hero_cta_text;
  if (cfg.featured_title) document.getElementById('featured-title').innerHTML = cfg.featured_title + ' <span>KITS</span>';
  if (cfg.announcement_on === 'true' && cfg.announcement) {
    const el = document.getElementById('announcement');
    el.textContent = '📢 ' + cfg.announcement;
    el.style.display = 'block';
  }
}

async function loadStats() {
  const { data } = await sb.from('kits').select('id, league, season').eq('is_published', true);
  if (!data) return;
  const leagues = new Set(), seasons = new Set();
  data.forEach(k => { if (k.league) leagues.add(k.league); if (k.season) seasons.add(k.season); });

  const { data: teamData } = await sb.from('kits').select('team').eq('is_published', true);
  const clubsCount = teamData ? new Set(teamData.map(k => k.team)).size : '—';
  const kitsCount = data.length;
  const leaguesCount = leagues.size;
  const seasonsCount = seasons.size;

  // Update original stats fallback
  const fallbackEl = document.getElementById('s-kits');
  if (fallbackEl) {
    document.getElementById('s-kits').textContent = kitsCount;
    document.getElementById('s-clubs').textContent = clubsCount;
    document.getElementById('s-leagues').textContent = leaguesCount;
    document.getElementById('s-seasons').textContent = seasonsCount;
  }

  // Update any dynamic builder stats widgets
  document.querySelectorAll('[id^="s-kits-d-"]').forEach(el => el.textContent = kitsCount);
  document.querySelectorAll('[id^="s-clubs-d-"]').forEach(el => el.textContent = clubsCount);
  document.querySelectorAll('[id^="s-leagues-d-"]').forEach(el => el.textContent = leaguesCount);
  document.querySelectorAll('[id^="s-seasons-d-"]').forEach(el => el.textContent = seasonsCount);
}

async function loadFeatured(limit = 4) {
  const { data } = await sb.from('kits_with_stats').select('*').eq('is_featured', true).eq('is_published', true).limit(limit);
  const grid = document.getElementById('featured-grid');
  if (!data || !data.length) { grid.innerHTML = '<div class="empty" style="grid-column: 1/-1; padding: 2rem;"><div class="empty-icon" style="font-size: 2rem;">⚽</div><h3 style="font-size: 1rem; letter-spacing: 1px;">NO FEATURED KITS</h3></div>'; return; }
  grid.innerHTML = data.map((k) => kitCardHTML(k)).join('');
}

async function loadLatest(limit = 8) {
  const { data } = await sb.from('kits_with_stats').select('*').eq('is_published', true).order('created_at', { ascending: false }).limit(limit);
  const grid = document.getElementById('latest-grid');
  if (!data) return;
  grid.innerHTML = data.map(k => kitCardHTML(k)).join('');
}

async function loadTopRated() {
  const { data } = await sb.from('kits_with_stats').select('*').eq('is_published', true).order('avg_rating', { ascending: false }).limit(5);
  const el = document.getElementById('top-rated-list');
  if (!data) return;
  el.innerHTML = data.map((k, i) => `
    <a href="/kit.html?slug=${k.slug}" style="display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--bd);text-decoration:none" onclick="trackClick()">
      <span style="font-family:var(--fm);font-size:.7rem;color:var(--w4);width:16px">${i+1}</span>
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--w);">${k.team}</div><div style="font-size:.75rem;color:var(--w4)">${k.season}</div></div>
      <span style="font-family:var(--fm);font-size:.72rem;color:var(--gold)">★ ${parseFloat(k.avg_rating).toFixed(1)}</span>
    </a>`).join('');
  if (el.lastElementChild) el.lastElementChild.style.borderBottom = 'none';
}

function kitCardHTML(k) {
  const bc = k.type === 'Home' ? 'b-home' : k.type === 'Away' ? 'b-away' : k.type === 'Special Edition' ? 'b-special' : 'b-third';
  return `<a href="/kit.html?slug=${k.slug}" class="kit-card" onclick="trackClick()">
    <div class="kit-card-img grad-${k.id.charCodeAt(0) % 6}">
      ${k.image_url ? `<img src="${k.image_url}" alt="${k.team}" loading="lazy"/>` : `<span class="kit-card-ph">⚽</span>`}
      <span class="badge ${bc}" style="position:absolute;top:.55rem;right:.55rem">${k.type}</span>
    </div>
    <div class="kit-card-body">
      <div class="kit-card-team">${k.team}</div>
      <div class="kit-card-season">${k.season}</div>
      <div class="kit-card-league">${k.league || ''}</div>
      <div class="kit-card-rating">${renderStars(parseFloat(k.avg_rating), k.rating_count)}</div>
    </div>
  </a>`;
}
</script>
</body>
</html>
